name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # Gate: Version bump validation
  # -----------------------------------------------------------------------
  version-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Version bump validation
        shell: bash
        env:
          ALLOW_MAJOR_BUMP: ${{ vars.ALLOW_MAJOR_BUMP || '' }}
        run: bash scripts/check-version-bump.sh "${{ github.ref_name }}"

  # -----------------------------------------------------------------------
  # Build: Multi-platform Tauri release
  # -----------------------------------------------------------------------
  publish-tauri:
    needs: version-gate
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download OpenCode sidecar
        working-directory: apps/desktop/src-tauri
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_OVERRIDE: ${{ matrix.target }}
        run: bash ../../../scripts/download-kernel.sh

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'AlderCowork ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true

  # -----------------------------------------------------------------------
  # Post: Rename assets to user-friendly names
  # -----------------------------------------------------------------------
  rename-assets:
    needs: publish-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rename release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: bash scripts/rename-release-assets.sh
